<!-- Include inside <head> of each HTML doc -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
  :root { --text: #1a1a1a; --muted: #555; --border: #ddd; --bg: #fafafa; --accent: #2563eb; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: Vazirmatn, Tahoma, sans-serif;
    direction: rtl;
    text-align: right;
    line-height: 1.85;
    color: var(--text);
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    background: #fff;
  }
  h1 { font-size: 1.75rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; }
  h2 { font-size: 1.35rem; margin-top: 2.5rem; color: #111; }
  h3 { font-size: 1.1rem; margin-top: 1.5rem; }
  p, li { font-size: 1rem; }
  .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.95rem; }
  th, td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: right; }
  th { background: var(--bg); }
  code, pre, .ltr, .mermaid-wrap { direction: ltr; text-align: left; unicode-bidi: embed; }
  code { background: #f0f0f0; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.88em; }
  pre { background: #f5f5f5; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 0.85rem; }
  .mermaid-wrap { margin: 1.5rem 0; padding: 1rem; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
  .note { background: #eff6ff; border-right: 4px solid var(--accent); padding: 1rem; margin: 1rem 0; border-radius: 0 8px 8px 0; }
  .future { background: #fefce8; border-right: 4px solid #ca8a04; padding: 1rem; margin: 1rem 0; border-radius: 0 8px 8px 0; }
  nav.toc { background: var(--bg); padding: 1rem 1.25rem; border-radius: 8px; margin-bottom: 2rem; }
  nav.toc a { color: var(--accent); text-decoration: none; }
  nav.toc a:hover { text-decoration: underline; }
</style>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: true, theme: 'neutral', securityLevel: 'loose' });
</script>
